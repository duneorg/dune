name: Publish to JSR

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # deno publish intermittently hangs in its post-upload status poll (the
    # artifact is live on JSR within minutes; runs otherwise burn 2h of
    # runner time before the hang times out). Killing the job after the
    # publish has gone through is harmless — JSR versions are immutable.
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # required for JSR OIDC auth

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # --no-provenance skips the Sigstore signing phase where publishes
      # intermittently hang (jsr-io/jsr#1448). Re-enable provenance once
      # that issue is fixed.
      - run: deno publish --no-provenance
